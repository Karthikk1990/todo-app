<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Welcome Back</h1>

      <div class="input-row">
        <input type="email" id="email" placeholder="Email address" />
      </div>
      <div class="input-row">
        <input type="password" id="password" placeholder="Password" />
      </div>

      <div class="input-row">
        <button onclick="login()">Log In</button>
      </div>

      <p id="message" style="margin-top:16px; font-size:14px;"></p>

      <p style="margin-top:24px; font-size:14px; color:#666;">
        No account yet? <a href="register.html">Register</a>
      </p>
    </div>

    <script>
      const API = "https://todo-backend-rb0m.onrender.com";

      async function login() {
        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const message  = document.getElementById("message");

        const response = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          /*
            Store the token in localStorage — the browser's built-in key/value store.
            It persists across page refreshes (unlike regular variables which reset).
            script.js will read it from here and attach it to every request.
          */
          localStorage.setItem("token", data.token);
          localStorage.setItem("email", data.email);

          // Redirect to the main app
          window.location.href = "index.html";
        } else {
          message.style.color = "red";
          message.textContent = data.error;
        }
      }

      // Allow pressing Enter to log in
      document.addEventListener("keydown", e => {
        if (e.key === "Enter") login();
      });
    </script>
  </body>
</html>
