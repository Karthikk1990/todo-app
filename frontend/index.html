<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Todo App</title>
    <link rel="stylesheet" href="style.css" />

    <!--
      These three lines load React from the internet (no install needed).
      - react: the core library (the brain)
      - react-dom: lets React talk to the browser's HTML (the hands)
      - babel: converts JSX into plain JavaScript the browser understands
    -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>

    <!--
      This single div is the ONLY thing React needs in our HTML.
      React will inject the entire app inside it.
      Think of it as an empty stage — React handles all the props and actors.
    -->
    <div id="root"></div>

    <!--
      type="text/babel" tells Babel to process this file.
      Without it, the browser sees JSX and crashes — it doesn't understand it natively.
    -->
    <script type="text/babel" src="app.jsx"></script>

  </body>
</html>
